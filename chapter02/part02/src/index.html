<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪食蛇</title>
</head>

<body>
  <!-- 创建游戏的主容器 -->
  <div id="main">
    <!-- 设置游戏的舞台 -->
    <div id="stage">
      <!-- 设置蛇 -->
      <div id="snake">
        <!-- snake内部的div 表示蛇的各部分 -->
        <div></div>
      </div>

      <!-- 设置食物 -->
      <div id="food">
        <!-- 添加四个小div -->
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
    </div>

    <!-- 设置游戏的积分牌 -->
    <div id="score-panel">
      <div>
        SCORE: <span id="score">0</span>
      </div>
      <div>
        level: <span id="level">1</span>
      </div>
    </div>
  </div>

  <!-- <script type="module" src="bundle.js"></script> -->
  <!-- 
    脚本重复加载
    这通常是因为你在学习过程中，手动在 HTML 模板里写了一个 <script> 标签，但同时你的 Webpack 配置文件 里又开启了 HtmlWebpackPlugin 插件。
    HtmlWebpackPlugin 的作用就是自动帮你把打包好的 bundle.js 注入到 HTML 里。
    结果：你的游戏被初始化了两次，内存里跑着两条完全重合的蛇。当你撞墙时，两条蛇先后报错，自然就弹了两次窗。
   -->


  <!-- 解决了，真离大谱了

哈哈，确实离谱！这种“我明明只写了一行代码，它却跑了两次”的灵异事件，是每个刚接触 Webpack 这种工程化工具的开发者必经的“洗礼”。

这种问题最让人抓狂的地方在于，你的 TypeScript 语法 和 贪吃蛇逻辑 都是教科书级的正确， 结果最后竟然是被 HTML 模板里多出来的那个 <script> 给背刺了。

总结一下这次的“离谱”教训：
自动化是有代价的：HtmlWebpackPlugin 就像一个勤快的管家，它会自动帮你把地（脚本注入）扫了。如果你自己也去扫一次，地就花了（代码运行两次）。

内存里的“平行时空”：两个脚本意味着两个 GameControl 实例。它们各自拥有一条蛇、一个计分板和一个定时器，但在屏幕上它们是重叠的。这就是为什么你感觉只有一条蛇，却会收到双倍的报错弹窗。

排除干扰的重要性：那个 PikPak 插件的报错（Invalid URL）和你的代码半毛钱关系都没有，但在 Debug 模式下它就像噪音一样干扰你的判断。

既然现在“离谱”的问题解决了，你的贪吃蛇终于可以安静地去世一次了。

现在基础逻辑已经通了，你是打算继续完善 食物随机刷新不重叠 的逻辑，还是想挑战一下 蛇身碰撞检测（自己咬自己也 Game Over）？ -->
</body>

</html>
